- id: "pedestrian-day-opening-1937"
  title: "The Day 200,000 People Walked the Bridge"
  subtitle: "On May 27, 1937, the Golden Gate Bridge opened to pedestrians first — and a quarter-million San Franciscans stampeded across it before a single car ever would."
  event_date: "1937-05-27"
  era: "Icon and Lifeline (1937–1964)"
  category: "Cultural & Symbolic"
  quote: "This bridge needs neither combatant nor defender. It is its own best testimony."
  quote_author: "Joseph Strauss"

- id: "safety-net-halfway-to-hell-club-1936"
  title: "The Safety Net That Saved Nineteen Lives"
  subtitle: "A revolutionary safety net beneath the bridge deck caught 19 falling workers during construction, creating the legendary 'Halfway to Hell Club.'"
  event_date: "1936-02-17"
  era: "Building in the Sky (1933–1937)"
  category: "Construction"
  quote: "The net under the floor of the bridge saved the lives of nineteen men during construction. Not one of these men was killed."
  quote_author: "Joseph Strauss"

- id: "bond-vote-1930"
  title: "Six Counties Bet on a Bridge During the Depression"
  subtitle: "In November 1930, voters in six California counties approved a $35 million bond measure to build the Golden Gate Bridge — an extraordinary act of faith during economic collapse."
  event_date: "1930-11-04"
  era: "Depression-Era Gamble (1930–1933)"
  category: "Political & Funding"
  quote: "The bridge needs only a district, a union of the counties, to make it possible."
  quote_author: "Joseph Strauss"

- id: "strauss-ugly-original-design-1921"
  title: "The Ugliest Bridge Never Built"
  subtitle: "Joseph Strauss's original 1921 design for the Golden Gate was a graceless cantilever-suspension hybrid that almost killed the project before it began."
  event_date: "1921-06-28"
  era: "Strauss and the Political Battle (1917–1929)"
  category: "Design & Engineering"
  quote: "A gigantic steel caterpillar crawling across the strait — that was the original Strauss design."
  quote_author: "Henry Petroski"

- id: "international-orange-irving-morrow-1935"
  title: "The Accidental Color That Defined a City"
  subtitle: "Consulting architect Irving Morrow fought the U.S. Navy to keep the bridge's red-orange primer as its permanent color, creating the most recognizable silhouette in American infrastructure."
  event_date: "1935-06-01"
  era: "Building in the Sky (1933–1937)"
  category: "Design & Engineering"
  quote: "The color of the bridge was not so much a calculated choice as a passionate conviction."
  quote_author: "Irving Morrow"
