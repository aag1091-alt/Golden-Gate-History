
- id: "safety-net-saves-nineteen-1936"
  title: "The Halfway-to-Hell Club"
  subtitle: "A revolutionary safety net beneath the Golden Gate Bridge saved 19 workers' lives during construction, creating an unprecedented brotherhood of survivors."
  event_date: "1936-02-17"
  era: "Depression-Era Construction (1930–1937)"
  category: "Construction"
  quote: "The Golden Gate Bridge is a triumph of simplicity and steel — the safety net was the most humane decision we made."
  quote_author: "Joseph Strauss"

- id: "bridge-flattens-50th-anniversary-1987"
  title: "The Day the Bridge Went Flat"
  subtitle: "During the 50th anniversary celebration, 300,000 pedestrians packed the Golden Gate Bridge so tightly that its roadway flattened under the weight, alarming engineers worldwide."
  event_date: "1987-05-24"
  era: "Cultural Icon and Dark Symbol (1971–1997)"
  category: "Disasters & Incidents"
  quote: "I looked out and the bridge was flat. I mean dead flat. I'd never seen anything like it. We were scared."
  quote_author: "Dale Luehring, Golden Gate Bridge maintenance supervisor"

- id: "bond-vote-during-depression-1930"
  title: "The $35 Million Gamble"
  subtitle: "In the teeth of the Great Depression, voters in six counties approved a massive bond measure to build a bridge many engineers said was impossible."
  event_date: "1930-11-04"
  era: "Depression-Era Construction (1930–1937)"
  category: "Political & Funding"
  quote: "The people of the six counties have shown their confidence in the future of this region by voting to build the greatest bridge the world has ever seen."
  quote_author: "Joseph Strauss"

- id: "international-orange-color-battle-1935"
  title: "The Color That Almost Wasn't"
  subtitle: "Architect Irving Morrow fought the U.S. Navy and Army to paint the bridge International Orange instead of battleship gray or candy-cane stripes."
  event_date: "1935-03-10"
  era: "Depression-Era Construction (1930–1937)"
  category: "Design & Engineering"
  quote: "The color was not chosen for the beauty of the thing itself but because of the beauty of the setting."
  quote_author: "Irving Morrow"

- id: "pedestrian-day-opening-1937"
  title: "The Day 200,000 People Walked the Bridge"
  subtitle: "Before a single car crossed, San Francisco threw the greatest walking party in American history."
  event_date: "1937-05-27"
  era: "Opening and Early Glory (1937–1945)"
  category: "Cultural & Symbolic"
  quote: "The bridge is yours — use it, enjoy it, and tell your children and your grandchildren that you were here today."
  quote_author: "Angelo Rossi, Mayor of San Francisco"

- id: "charles-ellis-unsung-engineer-1931"
  title: "The Engineer Erased from History"
  subtitle: "Joseph Strauss fired Charles Ellis, the man who actually designed the Golden Gate Bridge, and removed his name from every record."
  event_date: "1931-11-12"
  era: "The Fight to Build (1917–1929)"
  category: "Design & Engineering"
  quote: "He was the man most responsible for the design of the bridge, but his name was struck from every official document."
  quote_author: "Henry Petroski"

- id: "scaffold-collapse-1937"
  title: "The Day the Safety Net Failed"
  subtitle: "A collapsed scaffold sent twelve men plunging through the Golden Gate's famous safety net, killing ten and ending the bridge's remarkable safety record just months before completion."
  event_date: "1937-02-17"
  era: "Depression-Era Construction (1930–1937)"
  category: "Disasters & Incidents"
  quote: "I saw the scaffold drop and the net just tore away like it was paper. Those men never had a chance."
  quote_author: "Chris Hansen, surviving worker"
