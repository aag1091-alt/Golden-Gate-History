
- id: "safety-net-saves-nineteen-1936"
  title: "The Halfway-to-Hell Club"
  subtitle: "A revolutionary safety net beneath the Golden Gate Bridge saved 19 workers' lives during construction, creating an unprecedented brotherhood of survivors."
  event_date: "1936-02-17"
  era: "Depression-Era Construction (1930–1937)"
  category: "Construction"
  quote: "The Golden Gate Bridge is a triumph of simplicity and steel — the safety net was the most humane decision we made."
  quote_author: "Joseph Strauss"

- id: "bridge-flattens-50th-anniversary-1987"
  title: "The Day the Bridge Went Flat"
  subtitle: "During the 50th anniversary celebration, 300,000 pedestrians packed the Golden Gate Bridge so tightly that its roadway flattened under the weight, alarming engineers worldwide."
  event_date: "1987-05-24"
  era: "Cultural Icon and Dark Symbol (1971–1997)"
  category: "Disasters & Incidents"
  quote: "I looked out and the bridge was flat. I mean dead flat. I'd never seen anything like it. We were scared."
  quote_author: "Dale Luehring, Golden Gate Bridge maintenance supervisor"

- id: "bond-vote-during-depression-1930"
  title: "The $35 Million Gamble"
  subtitle: "In the teeth of the Great Depression, voters in six counties approved a massive bond measure to build a bridge many engineers said was impossible."
  event_date: "1930-11-04"
  era: "Depression-Era Construction (1930–1937)"
  category: "Political & Funding"
  quote: "The people of the six counties have shown their confidence in the future of this region by voting to build the greatest bridge the world has ever seen."
  quote_author: "Joseph Strauss"

- id: "international-orange-color-battle-1935"
  title: "The Color That Almost Wasn't"
  subtitle: "Architect Irving Morrow fought the U.S. Navy and Army to paint the bridge International Orange instead of battleship gray or candy-cane stripes."
  event_date: "1935-03-10"
  era: "Depression-Era Construction (1930–1937)"
  category: "Design & Engineering"
  quote: "The color was not chosen for the beauty of the thing itself but because of the beauty of the setting."
  quote_author: "Irving Morrow"

- id: "pedestrian-day-opening-1937"
  title: "The Day 200,000 People Walked the Bridge"
  subtitle: "Before a single car crossed, San Francisco threw the greatest walking party in American history."
  event_date: "1937-05-27"
  era: "Opening and Early Glory (1937–1945)"
  category: "Cultural & Symbolic"
  quote: "The bridge is yours — use it, enjoy it, and tell your children and your grandchildren that you were here today."
  quote_author: "Angelo Rossi, Mayor of San Francisco"

- id: "charles-ellis-unsung-engineer-1931"
  title: "The Engineer Erased from History"
  subtitle: "Joseph Strauss fired Charles Ellis, the man who actually designed the Golden Gate Bridge, and removed his name from every record."
  event_date: "1931-11-12"
  era: "The Fight to Build (1917–1929)"
  category: "Design & Engineering"
  quote: "He was the man most responsible for the design of the bridge, but his name was struck from every official document."
  quote_author: "Henry Petroski"

- id: "scaffold-collapse-1937"
  title: "The Day the Safety Net Failed"
  subtitle: "A collapsed scaffold sent twelve men plunging through the Golden Gate's famous safety net, killing ten and ending the bridge's remarkable safety record just months before completion."
  event_date: "1937-02-17"
  era: "Depression-Era Construction (1930–1937)"
  category: "Disasters & Incidents"
  quote: "I saw the scaffold drop and the net just tore away like it was paper. Those men never had a chance."
  quote_author: "Chris Hansen, surviving worker"

- id: "strauss-final-poem-1938"
  title: "The Mighty Task That Killed Its Builder"
  subtitle: "Joseph Strauss died just one year after his bridge opened, broken by the very fight that made him famous."
  event_date: "1938-05-16"
  era: "Opening and Early Glory (1937–1945)"
  category: "Cultural & Symbolic"
  quote: "At last the mighty task is done; Resplendent in the western sun, The Bridge looms mountain high."
  quote_author: "Joseph Strauss"

- id: "suicide-deterrent-net-approved-2014"
  title: "The Net That Took 77 Years to Approve"
  subtitle: "In 2014, the Golden Gate Bridge board finally voted to install a suicide deterrent net, ending decades of agonizing debate over the bridge's deadliest legacy."
  event_date: "2014-06-27"
  era: "Legacy and the Barrier Era"
  category: "Cultural & Symbolic"
  quote: "The net is not going to destroy the beauty of the bridge. It's going to enhance it by showing that we value human life."
  quote_author: "Kevin Hines"

- id: "bridge-closes-for-first-time-1951"
  title: "The Day the Wind Won"
  subtitle: "On December 1, 1951, the Golden Gate Bridge closed to all traffic for the first time in its history when gusts reached 69 mph, forcing engineers to confront the limits of its original design."
  event_date: "1951-12-01"
  era: "The Automobile Age (1946–1970)"
  category: "Disasters & Incidents"
  quote: "The bridge was swaying so violently that motorists abandoned their cars in the middle of the roadway and fled on foot."
  quote_author: "San Francisco Chronicle report, December 2, 1951"

- id: "loma-prieta-earthquake-test-1989"
  title: "The Earthquake the Bridge Survived"
  subtitle: "The 1989 Loma Prieta earthquake proved the Golden Gate Bridge's resilience while exposing seismic vulnerabilities that would drive a decades-long retrofit."
  event_date: "1989-10-17"
  era: "Cultural Icon and Dark Symbol (1971–1997)"
  category: "Disasters & Incidents"
  quote: "The bridge was designed for a static concept of wind and weight. Earthquakes were simply not part of the vocabulary in the 1930s."
  quote_author: "Charles Seim, seismic retrofit consulting engineer"

- id: "zipper-barrier-2015"
  title: "The Zipper That Tamed Head-On Death"
  subtitle: "A 3,500-ton moveable concrete barrier finally ended decades of fatal head-on collisions on the bridge's undivided roadway."
  event_date: "2015-01-11"
  era: "Retrofit and Renewal (1998–2017)"
  category: "Maintenance & Renovation"
  quote: "This is the single most significant safety feature added to the Golden Gate Bridge since the day it opened."
  quote_author: "Denis Mulligan"

- id: "billionth-car-crossing-1985"
  title: "The Billionth Car Across the Golden Gate"
  subtitle: "A routine commute turned a dentist into a celebrity when his car was flagged as the bridge's one-billionth vehicle."
  event_date: "1985-02-22"
  era: "Cultural Icon and Dark Symbol (1971–1997)"
  category: "Cultural & Symbolic"
  quote: "I was just driving to work. I had no idea I was about to become the billionth anything."
  quote_author: "Arthur Molinari"

- id: "fog-horns-golden-gate-1937"
  title: "The Foghorns That Guide the Lost"
  subtitle: "The Golden Gate Bridge's iconic mid-span foghorns became the sonic signature of San Francisco, blasting through fog that blankets the strait over 300 days a year."
  event_date: "1937-12-01"
  era: "Opening and Early Glory (1937–1945)"
  category: "Design & Engineering"
  quote: "The fog comes on little cat feet. It sits looking over harbor and city on silent haunches and then moves on."
  quote_author: "Carl Sandburg"

- id: "submarine-net-across-the-gate-1942"
  title: "The Steel Curtain Beneath the Waves"
  subtitle: "After Pearl Harbor, the Navy stretched a massive anti-submarine net across the Golden Gate, turning the bridge into the gateway of a fortress."
  event_date: "1942-03-10"
  era: "Opening and Early Glory (1937–1945)"
  category: "Cultural & Symbolic"
  quote: "The Golden Gate is the front door to the Pacific, and we intend to keep it locked."
  quote_author: "Admiral John W. Greenslade"

- id: "all-electronic-tolling-2013"
  title: "The Last Toll Taker's Final Shift"
  subtitle: "In 2013, the Golden Gate Bridge eliminated all human toll collectors, becoming the first major U.S. bridge to go fully electronic — ending a 76-year tradition."
  event_date: "2013-03-27"
  era: "Retrofit and Renewal (1998–2017)"
  category: "Maintenance & Renovation"
  quote: "It's bittersweet. You get to know the regulars. Some of them have been coming through my lane for 20 years."
  quote_author: "A Golden Gate Bridge toll collector interviewed by the San Francisco Chronicle, 2013"

- id: "strauss-original-ugly-design-1921"
  title: "The Ugliest Bridge Never Built"
  subtitle: "Joseph Strauss's original 1921 proposal was a grotesque cantilever-suspension hybrid that San Francisco rejected — forcing the redesign that created an icon."
  event_date: "1921-06-28"
  era: "The Fight to Build (1917–1929)"
  category: "Design & Engineering"
  quote: "Everyone says I built the Bridge, but the Bridge was really designed by my engineers."
  quote_author: "Joseph Strauss"

- id: "the-night-the-bridge-went-dark-1941"
  title: "The Night the Bridge Went Dark"
  subtitle: "Hours after Pearl Harbor, the Golden Gate Bridge's lights were extinguished for the first time — and would not return for years."
  event_date: "1941-12-08"
  era: "Opening and Early Glory (1937–1945)"
  category: "Cultural & Symbolic"
  quote: "I am determined that if possible we will not have a repetition of Pearl Harbor."
  quote_author: "General John L. DeWitt"

- id: "vertigo-hitchcock-filming-1958"
  title: "The Bridge That Starred in Vertigo"
  subtitle: "Alfred Hitchcock filmed his masterpiece beneath the Golden Gate, forever linking the bridge to cinematic obsession and dread."
  event_date: "1958-05-09"
  era: "The Automobile Age (1946–1970)"
  category: "Cultural & Symbolic"
  quote: "I made Vertigo because I wanted to present a man's dreamlike obsession with the past. The bridge was essential — it is the most beautiful structure for a beautiful death."
  quote_author: "Alfred Hitchcock"

- id: "spinning-the-cables-1935"
  title: "27,572 Wires Across the Sky"
  subtitle: "Over six months, workers shuttled individual steel wires back and forth across the Golden Gate strait to spin the bridge's two massive main cables by hand."
  event_date: "1935-11-05"
  era: "Depression-Era Construction (1930–1937)"
  category: "Construction"
  quote: "This bridge needs neither praise, nor eulogy, nor encomium. It speaks for itself. We who have labored long are grateful."
  quote_author: "Joseph Strauss"

- id: "first-jump-1937"
  title: "The Bridge's First Dark Moment"
  subtitle: "Just ten weeks after opening, a veteran's leap began the Golden Gate Bridge's longest and most painful legacy."
  event_date: "1937-08-07"
  era: "Opening and Early Glory (1937–1945)"
  category: "Disasters & Incidents"
  quote: "This is where I get off. I'm going to jump."
  quote_author: "Harold Wobber"

- id: "seiden-study-1978"
  title: "Where Are They Now?"
  subtitle: "A psychiatrist tracked 515 people stopped from jumping off the Golden Gate Bridge and discovered that 94% were still alive — reshaping how the world understands suicide."
  event_date: "1978-06-01"
  era: "Cultural Icon and Dark Symbol (1971–1997)"
  category: "Cultural & Symbolic"
  quote: "Suicidal behavior is crisis-oriented and time-limited. The impulse to destroy oneself does not last."
  quote_author: "Richard H. Seiden"

- id: "irving-morrow-art-deco-1930"
  title: "The Architect Who Made Steel Beautiful"
  subtitle: "Irving Morrow transformed a utilitarian span into an Art Deco masterpiece through stepped towers, geometric railings, and theatrical lighting — yet history nearly forgot him."
  event_date: "1930-08-15"
  era: "Depression-Era Construction (1930–1937)"
  category: "Design & Engineering"
  quote: "The simple and continuous structural lines may be emphasized by the decorative treatment so that the simpler the structure appears the more successful the treatment will be judged."
  quote_author: "Irving Morrow"

- id: "the-banker-who-believed-1932"
  title: "The Banker Who Believed"
  subtitle: "When no financier in America would touch the bridge bonds during the Depression, A.P. Giannini's Bank of America bought the entire issue and saved the project."
  event_date: "1932-11-01"
  era: "Depression-Era Construction (1930–1937)"
  category: "Political & Funding"
  quote: "We'll take the bonds."
  quote_author: "A.P. Giannini"

- id: "return-of-the-ferries-1970"
  title: "The Return of the Ferries"
  subtitle: "Thirty-three years after the bridge killed ferry service, crushing traffic congestion forced the Golden Gate corridor to bring the boats back."
  event_date: "1970-08-15"
  era: "The Automobile Age (1946–1970)"
  category: "Cultural & Symbolic"
  quote: "The bridge alone cannot solve the transportation problems of the Golden Gate corridor."
  quote_author: "Golden Gate Bridge Highway and Transportation District, 1969 report"

- id: "the-impossible-pier-1934"
  title: "The Pier That Defied the Pacific"
  subtitle: "Building the south tower's foundation 1,100 feet offshore in raging open ocean nearly doomed the entire bridge project."
  event_date: "1934-01-15"
  era: "Depression-Era Construction (1930–1937)"
  category: "Construction"
  quote: "The Gate is … one of the worst pieces of water in the whole world."
  quote_author: "Joseph Strauss"
