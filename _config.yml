title: "Spanning the Gate: A Golden Gate Bridge History"
tagline: "The story of the bridge they said could never be built"
description: "Explore the complete history of the Golden Gate Bridge, from the earliest dreams of spanning the strait to its rise as one of the world's most iconic landmarks. Discover the visionaries, engineers, and workers who made the impossible real."
baseurl: ""
url: ""

author:
  name: Bridge Chronicles

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

highlighter: rouge
color_theme: dark

permalink: /:year/:month/:day/:title/

collections:
  people:
    output: true
    permalink: /people/:slug/
  eras:
    output: true
    permalink: /eras/:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
