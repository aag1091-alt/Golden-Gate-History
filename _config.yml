title: "History Blog"
tagline: "A history blog"
description: "A history blog generated by the history blog generator."
baseurl: ""
url: ""

author:
  name: History Blog

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

highlighter: rouge
color_theme: dark

permalink: /:year/:month/:day/:title/

collections:
  people:
    output: true
    permalink: /people/:slug/
  eras:
    output: true
    permalink: /eras/:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
